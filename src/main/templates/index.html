<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Failure Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Pipeline Failure Analyzer</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Analyze Pipeline Log</div>
                    <div class="card-body">
                        <form id="analyzeForm">
                            <div class="mb-3">
                                <label class="form-label">Pipeline Name</label>
                                <input type="text" class="form-control" id="pipelineName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Log Content</label>
                                <textarea class="form-control" id="logContent" rows="8" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Analyze</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Analysis Result</div>
                    <div class="card-body" id="resultArea">
                        <p class="text-muted">Submit a log for analysis</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">Statistics</div>
                    <div class="card-body">
                        <canvas id="statsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">Recent Failures</div>
                    <div class="card-body">
                        <table class="table table-striped" id="failuresTable">
                            <thead>
                                <tr>
                                    <th>Pipeline</th>
                                    <th>Category</th>
                                    <th>Severity</th>
                                    <th>Timestamp</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('analyzeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    pipeline_name: document.getElementById('pipelineName').value,
                    log_content: document.getElementById('logContent').value
                })
            });
            const result = await response.json();
            displayResult(result);
            loadFailures();
            loadStats();
        });

        function displayResult(result) {
            const html = `
                <h5>Category: <span class="badge bg-info">${result.category}</span></h5>
                <h6>Severity: <span class="badge bg-${getSeverityColor(result.severity)}">${result.severity}</span></h6>
                <p><strong>Root Cause:</strong> ${result.root_cause}</p>
                <p><strong>Recommendations:</strong></p>
                <ul>${result.recommendations.map(r => `<li>${r}</li>`).join('')}</ul>
            `;
            document.getElementById('resultArea').innerHTML = html;
        }

        function getSeverityColor(severity) {
            const colors = {critical: 'danger', high: 'warning', medium: 'info', low: 'secondary'};
            return colors[severity] || 'secondary';
        }

        async function loadFailures() {
            const response = await fetch('/api/failures?limit=10');
            const failures = await response.json();
            const tbody = document.querySelector('#failuresTable tbody');
            tbody.innerHTML = failures.map(f => `
                <tr>
                    <td>${f.pipeline_name}</td>
                    <td>${f.category}</td>
                    <td><span class="badge bg-${getSeverityColor(f.severity)}">${f.severity}</span></td>
                    <td>${new Date(f.timestamp).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        async function loadStats() {
            const response = await fetch('/api/stats');
            const stats = await response.json();
            
            const ctx = document.getElementById('statsChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(stats.by_category),
                    datasets: [{
                        label: 'Failures by Category',
                        data: Object.values(stats.by_category),
                        backgroundColor: 'rgba(54, 162, 235, 0.5)'
                    }]
                }
            });
        }

        loadFailures();
        loadStats();
    </script>
</body>
</html>
