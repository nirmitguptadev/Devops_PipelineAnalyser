apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-analyzer
  labels:
    app: pipeline-analyzer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pipeline-analyzer
  template:
    metadata:
      labels:
        app: pipeline-analyzer
    spec:
      containers:
      - name: pipeline-analyzer
        image: pipeline-analyzer:latest
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
