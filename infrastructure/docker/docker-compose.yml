version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:///pipeline_analyzer.db
    volumes:
      - ../../src:/app/src
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
